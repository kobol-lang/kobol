ShortDescription: A modern COBOL-inspired language for the JVM
Description: |-
  Kobol is a modern COBOL-inspired programming language that compiles to JVM
  bytecode. It features static typing, exact decimal arithmetic, pattern
  matching, virtual-thread concurrency, built-in testing, an HTTP/REST client,
  a lightweight REST API server, parameterised JDBC/SQL, and a native binary
  distribution with sub-50ms startup.
