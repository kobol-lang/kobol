# =============================================================================
# ci.yml — Run tests on every push and pull request
#
# Three test jobs run in parallel:
#   test-graalvm  — GraalVM Community 21 on ubuntu / macos / windows
#   test-temurin  — Eclipse Temurin (Adoptium) 21 on ubuntu / macos / windows
#   test-openj9   — Eclipse OpenJ9 (IBM Semeru) 21 on ubuntu / macos
# =============================================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # GraalVM Community — needed to verify native-image reflection configs
  # ---------------------------------------------------------------------------
  test-graalvm:
    name: GraalVM / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-graalvm-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-graalvm-${{ runner.os }}-

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-graalvm-${{ matrix.os }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Eclipse Temurin (Adoptium) — standard HotSpot JVM
  # ---------------------------------------------------------------------------
  test-temurin:
    name: Temurin / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Eclipse Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-temurin-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-temurin-${{ runner.os }}-

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-temurin-${{ matrix.os }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Eclipse OpenJ9 (IBM Semeru Runtime) — alternative JVM with low-memory footprint
  # OpenJ9 does not publish Windows builds for Java 21 via setup-java, so
  # the matrix is limited to ubuntu and macos.
  # ---------------------------------------------------------------------------
  test-openj9:
    name: OpenJ9 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up IBM Semeru (Eclipse OpenJ9) JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "semeru"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-openj9-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-openj9-${{ runner.os }}-

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-openj9-${{ matrix.os }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
